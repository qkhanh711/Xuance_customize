dl_toolbox: "torch"
project_name: "dreamerv3_satellite"
logger: "tensorboard"
wandb_user_name: "qkhanh711"
render: False
render_mode: 'rgb_array'
fps: 50
test_mode: False
device: "cuda"
distributed_training: False
master_port: '12355'

agent: "DreamerV3"
env_name: "SatelliteMECEnvironment"
env_id: "new_env_id"
env_seed: 1
vectorize: "DummyVecEnv"
representation: "DreamerV3WorldModel"
learner: "DreamerV3_Learner"
policy: "DreamerV3Policy"
runner: "DRL"

# world_model & actor_critic start
harmony: False

distribution:
  validate_args: false
  type: auto
pixel: False
env_config:
  screen_size: 64
activation: 'silu'

actor:
  ent_coef: 0.0003
  min_std: 0.1
  max_std: 1.0
  init_std: 2.0
  mlp_layers: 2
  layer_norm:
    kw:
      eps: 0.001
  dense_units: 256
  clip_gradients: 100.0
  unimix: 0.01
  action_clip: 1.0
  moments:
    decay: 0.99
    max: 1.0
    percentile:
      low: 0.05
      high: 0.95

critic:
  mlp_layers: 2
  layer_norm:
    kw:
      eps: 0.001
  dense_units: 256
  soft_update_freq: 1
  tau: 0.02
  bins: 255
  clip_gradients: 100.0

world_model:
  discrete_size: 32
  stochastic_size: 32
  kl_dynamic: 0.5
  kl_representation: 0.1
  kl_free_nats: 1.0
  kl_regularizer: 1.0
  continue_scale_factor: 1.0
  clip_gradients: 1000.0
  learnable_initial_recurrent_state: true
  encoder:
    cnn_channels_multiplier: 32
    mlp_layers: 2
    cnn_layer_norm:
      kw:
        eps: 0.001
    mlp_layer_norm:
      kw:
        eps: 0.001
    dense_units: 256
  recurrent_model:
    recurrent_state_size: 256
    layer_norm:
      kw:
        eps: 0.001
    dense_units: 256
  transition_model:
    hidden_size: 256
    layer_norm:
      kw:
        eps: 0.001
  representation_model:
    hidden_size: 256
    layer_norm:
      kw:
        eps: 0.001
  observation_model:
    cnn_channels_multiplier: 32
    mlp_layers: 2
    cnn_layer_norm:
      kw:
        eps: 0.001
    mlp_layer_norm:
      kw:
        eps: 0.001
    dense_units: 256
  reward_model:
    mlp_layers: 2
    layer_norm:
      kw:
        eps: 0.001
    dense_units: 256
    bins: 255
  discount_model:
    learnable: true
    mlp_layers: 2
    layer_norm:
      kw:
        eps: 0.001
    dense_units: 256

gamma: 0.996996996996997
lmbda: 0.95
horizon: 15

unimix: 0.01
hafner_initialization: True
# world_model & actor_critic end

seed: 79811
parallels: 2
buffer_size: 200000
batch_size: 8
seq_len: 16
learning_rate_model: 0.0001
learning_rate_actor: 0.00008
learning_rate_critic: 0.00008

replay_ratio: 1
running_steps: 20000
start_training: 64

use_grad_clip: False
clip_type: 1
grad_clip_norm: 100.0
use_actions_mask: False
use_obsnorm: False
use_rewnorm: False
obsnorm_range: 5
rewnorm_range: 5

eval_interval: 200
test_episode: 3
log_dir: "logs/dreamer-v3/"
model_dir: "models/dreamer-v3/"
